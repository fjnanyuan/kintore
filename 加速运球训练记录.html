<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>加速运球训练记录</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --danger: #dc2626;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 18px 14px 42px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 18px;
      border-radius: 20px;
      color: white;
      background: linear-gradient(135deg, #111827, #1e3a8a);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 6vw, 34px);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0;
      color: rgba(255,255,255,.78);
      font-size: 14px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      font-weight: 700;
    }

    .progress-track {
      height: 12px;
      margin-top: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #86efac);
      transition: width .45s cubic-bezier(.2,.8,.2,1);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .summary-card {
      padding: 13px 8px;
      text-align: center;
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-card strong {
      display: block;
      font-size: 22px;
    }

    .summary-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .tip {
      margin: 12px 0 14px;
      padding: 13px 15px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 14px;
      line-height: 1.55;
    }

    .groups {
      display: grid;
      gap: 12px;
    }

    .group-card {
      position: relative;
      padding: 16px;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      transition: transform .2s ease, border-color .3s ease, background .3s ease;
    }

    .group-card.completed {
      border-color: #22c55e;
      background: linear-gradient(145deg, #ffffff, var(--success-soft));
      transform: scale(.995);
    }

    .group-card.completed::after {
      content: "✓";
      position: absolute;
      right: 12px;
      top: 2px;
      color: rgba(22,163,74,.13);
      font-size: 88px;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 13px;
      font-size: 18px;
      font-weight: 800;
    }

    .group-number {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: white;
      background: #111827;
      font-size: 15px;
    }

    .completed .group-number { background: var(--success); }

    .hand-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hand-box {
      position: relative;
      z-index: 1;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.86);
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input[type="number"] {
      width: 100%;
      height: 46px;
      padding: 0 12px;
      border: 2px solid var(--line);
      border-radius: 11px;
      outline: none;
      color: var(--text);
      background: white;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }

    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    input:disabled {
      color: #166534;
      background: #f0fdf4;
      opacity: 1;
    }

    .complete-btn {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 50px;
      margin-top: 12px;
      border: 0;
      border-radius: 13px;
      color: white;
      background: var(--primary);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
      box-shadow: 0 7px 16px rgba(37,99,235,.22);
    }

    .complete-btn:active { transform: scale(.98); }
    .complete-btn:hover { background: var(--primary-dark); }

    .completed .complete-btn {
      background: var(--success);
      box-shadow: 0 7px 16px rgba(22,163,74,.22);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .reset-btn {
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 11px 18px;
      color: var(--danger);
      background: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      z-index: 100;
      min-width: 210px;
      max-width: calc(100vw - 30px);
      padding: 13px 18px;
      border-radius: 999px;
      color: white;
      background: rgba(17,24,39,.95);
      text-align: center;
      font-weight: 750;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translate(-50%, 24px);
      pointer-events: none;
      transition: opacity .25s, transform .25s;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .finish-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(17,24,39,.72);
      backdrop-filter: blur(7px);
    }

    .finish-overlay.show { display: grid; }

    .finish-box {
      width: min(430px, 100%);
      padding: 28px 22px;
      border-radius: 24px;
      background: white;
      text-align: center;
      animation: pop .38s cubic-bezier(.2,.9,.3,1.25);
    }

    .finish-icon { font-size: 70px; }
    .finish-box h2 { margin: 5px 0 8px; font-size: 28px; }
    .finish-box p { color: var(--muted); line-height: 1.6; }

    .close-finish {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 13px;
      color: white;
      background: var(--success);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .confetti {
      position: fixed;
      z-index: 210;
      top: -20px;
      width: 10px;
      height: 18px;
      border-radius: 2px;
      animation: fall 1.8s linear forwards;
      pointer-events: none;
    }

    @keyframes pop {
      from { transform: scale(.72); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fall {
      to {
        transform: translate3d(var(--drift), 110vh, 0) rotate(780deg);
        opacity: .9;
      }
    }

    @media (max-width: 430px) {
      .app { padding-inline: 10px; }
      .hero { border-radius: 17px; padding: 16px; }
      .group-card { padding: 14px; }
      .summary-card strong { font-size: 19px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>加速运球训练</h1>
      <p class="subtitle">10组 · 每组左右手各一次 · 记录掉球次数</p>

      <div class="progress-row">
        <span>训练进度</span>
        <span id="progressText">0 / 10</span>
      </div>
      <div class="progress-track" aria-label="训练进度">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <section class="summary" aria-label="训练统计">
      <div class="summary-card">
        <strong id="doneCount">0</strong>
        <span>已完成组数</span>
      </div>
      <div class="summary-card">
        <strong id="leftTotal">0</strong>
        <span>左手掉球</span>
      </div>
      <div class="summary-card">
        <strong id="rightTotal">0</strong>
        <span>右手掉球</span>
      </div>
    </section>

    <div class="tip">
      每组先完成左手，再完成右手。输入掉球次数后按“完成本组”。已完成的组会变成绿色，并自动保存在本机浏览器。
    </div>

    <section class="groups" id="groups"></section>

    <div class="actions">
      <button class="reset-btn" id="resetBtn" type="button">清空全部记录</button>
    </div>
  </main>

  <div class="toast" id="toast" role="status"></div>

  <div class="finish-overlay" id="finishOverlay">
    <div class="finish-box">
      <div class="finish-icon">🏀</div>
      <h2>10组全部完成！</h2>
      <p id="finishSummary"></p>
      <button class="close-finish" id="closeFinish" type="button">查看训练记录</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "speedDribbleTraining_v1";
    const state = loadState();
    const groupsEl = document.getElementById("groups");
    const toastEl = document.getElementById("toast");
    const finishOverlay = document.getElementById("finishOverlay");

    function defaultState() {
      return Array.from({ length: 10 }, (_, i) => ({
        id: i + 1,
        leftDrops: 0,
        rightDrops: 0,
        completed: false
      }));
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length === 10) return saved;
      } catch (e) {}
      return defaultState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function render() {
      groupsEl.innerHTML = "";

      state.forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "group-card" + (item.completed ? " completed" : "");
        card.innerHTML = `
          <div class="group-title">
            <span class="group-number">${index + 1}</span>
            <span>第 ${index + 1} 组</span>
          </div>

          <div class="hand-grid">
            <div class="hand-box">
              <label for="left-${index}">左手掉球次数</label>
              <input
                id="left-${index}"
                type="number"
                inputmode="numeric"
                min="0"
                step="1"
                value="${item.leftDrops}"
                ${item.completed ? "disabled" : ""}
              />
            </div>

            <div class="hand-box">
              <label for="right-${index}">右手掉球次数</label>
              <input
                id="right-${index}"
                type="number"
                inputmode="numeric"
                min="0"
                step="1"
                value="${item.rightDrops}"
                ${item.completed ? "disabled" : ""}
              />
            </div>
          </div>

          <button class="complete-btn" type="button">
            ${item.completed ? "✓ 已完成（点击可修改）" : "完成本组"}
          </button>
        `;

        const leftInput = card.querySelector(`#left-${index}`);
        const rightInput = card.querySelector(`#right-${index}`);
        const button = card.querySelector(".complete-btn");

        const syncNumbers = () => {
          item.leftDrops = sanitize(leftInput.value);
          item.rightDrops = sanitize(rightInput.value);
          leftInput.value = item.leftDrops;
          rightInput.value = item.rightDrops;
          saveState();
          updateSummary();
        };

        leftInput.addEventListener("change", syncNumbers);
        rightInput.addEventListener("change", syncNumbers);

        button.addEventListener("click", () => {
          if (item.completed) {
            item.completed = false;
            saveState();
            render();
            showToast(`第 ${index + 1} 组已重新打开`);
            return;
          }

          syncNumbers();
          item.completed = true;
          saveState();
          render();
          showToast(`第 ${index + 1} 组完成 ✓`);
          vibrate();

          if (state.every(group => group.completed)) {
            setTimeout(showFinish, 320);
          }
        });

        groupsEl.appendChild(card);
      });

      updateSummary();
    }

    function sanitize(value) {
      const number = Number.parseInt(value, 10);
      return Number.isFinite(number) && number >= 0 ? number : 0;
    }

    function updateSummary() {
      const completed = state.filter(item => item.completed).length;
      const leftTotal = state.reduce((sum, item) => sum + sanitize(item.leftDrops), 0);
      const rightTotal = state.reduce((sum, item) => sum + sanitize(item.rightDrops), 0);

      document.getElementById("doneCount").textContent = completed;
      document.getElementById("leftTotal").textContent = leftTotal;
      document.getElementById("rightTotal").textContent = rightTotal;
      document.getElementById("progressText").textContent = `${completed} / 10`;
      document.getElementById("progressBar").style.width = `${completed * 10}%`;
    }

    let toastTimer;
    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add("show");
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
    }

    function vibrate() {
      if ("vibrate" in navigator) navigator.vibrate([45, 35, 70]);
    }

    function showFinish() {
      const leftTotal = state.reduce((sum, item) => sum + item.leftDrops, 0);
      const rightTotal = state.reduce((sum, item) => sum + item.rightDrops, 0);
      document.getElementById("finishSummary").textContent =
        `本次左手共掉球 ${leftTotal} 次，右手共掉球 ${rightTotal} 次。`;
      finishOverlay.classList.add("show");
      launchConfetti();
    }

    function launchConfetti() {
      const colors = ["#2563eb", "#16a34a", "#f59e0b", "#ef4444", "#8b5cf6", "#06b6d4"];
      for (let i = 0; i < 70; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * .5}s`;
        piece.style.animationDuration = `${1.35 + Math.random() * 1.2}s`;
        piece.style.setProperty("--drift", `${-90 + Math.random() * 180}px`);
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2900);
      }
    }

    document.getElementById("closeFinish").addEventListener("click", () => {
      finishOverlay.classList.remove("show");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("确定清空10组训练记录吗？")) return;
      const fresh = defaultState();
      state.splice(0, state.length, ...fresh);
      saveState();
      render();
      finishOverlay.classList.remove("show");
      showToast("训练记录已清空");
    });

    render();
  </script>
</body>
</html>
