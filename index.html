  </style>
</head>
<body>
  <main class="app">
    <section id="homePage" class="page active">
      <div class="header">
        <h1>我的训练</h1>
        <p>选择今天要训练的部位</p>
      </div>

      <div class="part-grid">
        <button class="part-btn disabled" type="button" aria-disabled="true">
          <span class="icon">🏋️</span>
          <span class="name">胸</span>
          <span class="state">待添加</span>
        </button>

        <button class="part-btn disabled" type="button" aria-disabled="true">
          <span class="icon">💪</span>
          <span class="name">肩</span>
          <span class="state">待添加</span>
        </button>

        <button id="openBack" class="part-btn available" type="button">
          <span class="icon">🔥</span>
          <span class="name">背</span>
          <span class="state">进入训练</span>
        </button>

        <button class="part-btn disabled" type="button" aria-disabled="true">
          <span class="icon">⚡</span>
          <span class="name">腹</span>
          <span class="state">待添加</span>
        </button>
      </div>
    </section>

    <section id="backPage" class="page">
      <div class="topbar">
        <button id="goHome" class="back-btn" type="button" aria-label="返回">←</button>
        <div class="title-wrap">
          <h2>背部训练</h2>
          <p>填写每组次数，全部填写后自动完成</p>
        </div>
      </div>

      <div class="summary">
        <div class="summary-row">
          <strong id="progressText">已完成 0 / 12 组</strong>
          <span id="saveText">自动保存</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>

      <div id="exerciseList"></div>

      <div id="finishCard" class="finish-card">
        <div class="check">✓</div>
        <h3>背部训练完成</h3>
        <p>12 组动作已经全部记录。</p>
      </div>

      <div class="reset-wrap">
        <button id="resetBtn" class="reset-btn" type="button">清空本次训练记录</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast">已自动保存</div>

  <script>
    const exercises = [
      {
        id: "pullup",
        name: "引体向上",
        detail: "自重"
      },
      {
        id: "latPulldown",
        name: "高位下拉",
        detail: "固定重量：70 kg"
      },
      {
        id: "cableRow",
        name: "龙门架单边背拉",
        detail: "固定重量：27.5 kg"
      }
    ];

    const STORAGE_KEY = "backWorkoutRecordV1";
    const homePage = document.getElementById("homePage");
    const backPage = document.getElementById("backPage");
    const exerciseList = document.getElementById("exerciseList");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const finishCard = document.getElementById("finishCard");
    const saveText = document.getElementById("saveText");
    const toast = document.getElementById("toast");

    let toastTimer;

    function createExerciseCards() {
      exerciseList.innerHTML = exercises.map((exercise, exerciseIndex) => {
        const rows = Array.from({ length: 4 }, (_, setIndex) => `
          <div class="set-row">
            <div class="set-label">第${setIndex + 1}组</div>

            <div class="field">
              <input
                type="number"
                min="0"
                step="1"
                inputmode="numeric"
                placeholder=""
                aria-label="${exercise.name}第${setIndex + 1}组次数"
                data-exercise="${exercise.id}"
                data-set="${setIndex}"
                data-type="reps"
              />
              <span class="unit">次</span>
            </div>

            <div class="field">
              <textarea
                rows="1"
                placeholder="本组评论"
                aria-label="${exercise.name}第${setIndex + 1}组评论"
                data-exercise="${exercise.id}"
                data-set="${setIndex}"
                data-type="comment"
              ></textarea>
            </div>
          </div>
        `).join("");

        return `
          <article class="exercise-card" data-card="${exercise.id}">
            <div class="exercise-head">
              <div>
                <h3>${exerciseIndex + 1}. ${exercise.name}</h3>
                <p>${exercise.detail}</p>
              </div>
              <span id="badge-${exercise.id}" class="badge">0 / 4</span>
            </div>
            <div>${rows}</div>
          </article>
        `;
      }).join("");
    }

    function getEmptyData() {
      const data = {};
      exercises.forEach(exercise => {
        data[exercise.id] = Array.from({ length: 4 }, () => ({
          reps: "",
          comment: ""
        }));
      });
      return data;
    }

    function collectData() {
      const data = getEmptyData();

      document.querySelectorAll("[data-exercise]").forEach(field => {
        const exerciseId = field.dataset.exercise;
        const setIndex = Number(field.dataset.set);
        const type = field.dataset.type;
        data[exerciseId][setIndex][type] = field.value;
      });

      return data;
    }

    function applyData(data) {
      document.querySelectorAll("[data-exercise]").forEach(field => {
        const exerciseId = field.dataset.exercise;
        const setIndex = Number(field.dataset.set);
        const type = field.dataset.type;
        const savedValue = data?.[exerciseId]?.[setIndex]?.[type];
        field.value = savedValue ?? "";
      });
    }

    function saveData(showToast = false) {
      const data = collectData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      saveText.textContent = "已自动保存";

      if (showToast) {
        clearTimeout(toastTimer);
        toast.classList.add("show");
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1100);
      }
    }

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        applyData(JSON.parse(saved));
      } catch (error) {
        console.warn("读取训练记录失败：", error);
      }
    }

    function isFilled(value) {
      return String(value).trim() !== "";
    }

    function updateProgress() {
      let totalDone = 0;

      exercises.forEach(exercise => {
        const repInputs = Array.from(
          document.querySelectorAll(
            `input[data-exercise="${exercise.id}"][data-type="reps"]`
          )
        );

        const done = repInputs.filter(input => isFilled(input.value)).length;
        totalDone += done;

        const badge = document.getElementById(`badge-${exercise.id}`);
        badge.textContent = done === 4 ? "已完成" : `${done} / 4`;
        badge.classList.toggle("done", done === 4);
      });

      progressText.textContent = `已完成 ${totalDone} / 12 组`;
      progressBar.style.width = `${(totalDone / 12) * 100}%`;
      finishCard.classList.toggle("show", totalDone === 12);
    }

    function switchPage(target) {
      homePage.classList.toggle("active", target === "home");
      backPage.classList.toggle("active", target === "back");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("openBack").addEventListener("click", () => {
      switchPage("back");
    });

    document.getElementById("goHome").addEventListener("click", () => {
      switchPage("home");
    });

    exerciseList.addEventListener("input", event => {
      if (!event.target.matches("[data-exercise]")) return;

      saveText.textContent = "保存中…";
      updateProgress();

      window.clearTimeout(event.target._saveTimer);
      event.target._saveTimer = window.setTimeout(() => {
        saveData(false);
      }, 250);
    });

    exerciseList.addEventListener("change", event => {
      if (!event.target.matches("[data-exercise]")) return;
      saveData(true);
      updateProgress();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      const confirmed = confirm("确定清空这次背部训练的所有记录吗？");
      if (!confirmed) return;

      localStorage.removeItem(STORAGE_KEY);
      applyData(getEmptyData());
      updateProgress();
      saveText.textContent = "记录已清空";
    });

    createExerciseCards();
    loadData();
    updateProgress();
  </script>
</body>
</html>
'''

path = Path("/mnt/data/我的训练记录_背部.html")
path.write_text(html, encoding="utf-8")
print(f"已生成：{path}")
