<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>我的训练记录</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --line: #e5e7eb;
      --dark: #111827;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --gold: #b7791f;
      --gold-bg: #fff7d6;
      --red: #dc2626;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    button, input, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app {
      width: min(780px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(20px, env(safe-area-inset-top)) 16px
               max(32px, env(safe-area-inset-bottom));
    }

    .page { display: none; }
    .page.active { display: block; }

    .header { margin: 10px 2px 26px; }
    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 7vw, 38px);
      letter-spacing: -0.04em;
    }
    .header p {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.6;
    }

    .part-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .part-btn {
      min-height: 145px;
      border: 0;
      border-radius: 22px;
      padding: 20px;
      background: var(--card);
      color: var(--text);
      box-shadow: var(--shadow);
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .part-btn:active { transform: scale(0.98); }
    .part-btn .icon {
      display: block;
      margin-bottom: 24px;
      font-size: 34px;
    }
    .part-btn .name {
      display: block;
      font-size: 23px;
      font-weight: 800;
    }
    .part-btn .state {
      display: block;
      margin-top: 7px;
      color: var(--sub);
      font-size: 13px;
    }
    .part-btn.available {
      background: var(--dark);
      color: white;
    }
    .part-btn.available .state { color: #cbd5e1; }
    .part-btn.disabled {
      cursor: default;
      color: #6b7280;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 16px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      border: 0;
      border-radius: 14px;
      background: var(--card);
      box-shadow: var(--shadow);
      cursor: pointer;
      font-size: 21px;
    }

    .title-wrap { flex: 1; min-width: 0; }
    .title-wrap h2 {
      margin: 0;
      font-size: 26px;
    }
    .title-wrap p {
      margin: 4px 0 0;
      overflow: hidden;
      color: var(--sub);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 16px;
      padding: 5px;
      border-radius: 16px;
      background: #e5e7eb;
    }
    .tab-btn {
      height: 42px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      font-weight: 800;
    }
    .tab-btn.active {
      background: white;
      color: var(--text);
      box-shadow: 0 4px 12px rgba(17, 24, 39, 0.08);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .summary {
      margin-bottom: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--dark);
      color: white;
      box-shadow: var(--shadow);
    }
    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .summary strong { font-size: 16px; }
    .summary span {
      color: #cbd5e1;
      font-size: 13px;
    }
    .progress-track {
      height: 8px;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #374151;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: white;
      transition: width 0.25s ease;
    }

    .exercise-card {
      margin-bottom: 16px;
      overflow: hidden;
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .exercise-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }
    .exercise-head h3 {
      margin: 0;
      font-size: 19px;
    }
    .exercise-head p {
      margin: 5px 0 0;
      color: var(--sub);
      font-size: 13px;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 10px;
      background: #f3f4f6;
      color: var(--sub);
      font-size: 12px;
      font-weight: 800;
    }
    .badge.done {
      background: var(--green-bg);
      color: var(--green);
    }

    .set-row {
      display: grid;
      grid-template-columns: 54px minmax(82px, 0.8fr) 1.8fr;
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }
    .set-row.sided {
      grid-template-columns: 54px minmax(68px, 0.7fr) minmax(68px, 0.7fr) 1.5fr;
    }
    .set-row:last-child { border-bottom: 0; }
    .set-label {
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .field { position: relative; }
    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      background: #f9fafb;
      color: var(--text);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .field input {
      height: 44px;
      padding: 0 34px 0 8px;
      text-align: center;
      font-weight: 800;
    }
    .field textarea {
      min-height: 44px;
      max-height: 110px;
      padding: 11px 12px;
      resize: vertical;
      line-height: 1.4;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: #9ca3af;
      background: white;
    }
    .field input:disabled,
    .field textarea:disabled {
      opacity: 1;
      background: #f3f4f6;
      color: #4b5563;
      -webkit-text-fill-color: #4b5563;
    }
    .unit {
      position: absolute;
      top: 50%;
      right: 9px;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--sub);
      font-size: 11px;
    }

    .finish-card {
      display: none;
      margin-top: 20px;
      padding: 24px 20px;
      border-radius: 22px;
      background: var(--green-bg);
      color: #14532d;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .finish-card.show {
      display: block;
      animation: pop 0.35s ease;
    }
    .finish-card .check { font-size: 38px; }
    .finish-card h3 {
      margin: 8px 0 5px;
      font-size: 22px;
    }
    .finish-card p {
      margin: 0 0 16px;
      font-size: 14px;
    }

    .primary-btn {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: var(--dark);
      color: white;
      cursor: pointer;
      font-weight: 800;
    }

    .subtle-wrap {
      padding-top: 16px;
      text-align: center;
    }
    .text-btn {
      border: 0;
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      font-size: 13px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .text-btn.danger { color: var(--red); }

    .history-empty {
      padding: 42px 20px;
      border-radius: 22px;
      background: white;
      color: var(--sub);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .history-card {
      margin-bottom: 14px;
      overflow: hidden;
      border-radius: 20px;
      background: white;
      box-shadow: var(--shadow);
    }
    .history-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 17px;
      border-bottom: 1px solid var(--line);
    }
    .history-date {
      font-size: 16px;
      font-weight: 900;
    }
    .history-time {
      margin-top: 4px;
      color: var(--sub);
      font-size: 12px;
    }
    .history-number {
      color: var(--sub);
      font-size: 12px;
      white-space: nowrap;
    }

    .history-exercise {
      padding: 13px 17px;
      border-bottom: 1px solid var(--line);
    }
    .history-exercise:last-child { border-bottom: 0; }
    .history-exercise-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .history-exercise strong { font-size: 14px; }
    .total {
      font-size: 14px;
      font-weight: 900;
    }
    .pr-pill {
      display: inline-block;
      margin-left: 6px;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--gold-bg);
      color: var(--gold);
      font-size: 10px;
      font-weight: 900;
      vertical-align: 1px;
    }
    .sets-text {
      margin-top: 7px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
      word-break: break-word;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(17, 24, 39, 0.58);
      backdrop-filter: blur(4px);
    }
    .modal.show { display: flex; }

    .modal-card {
      width: min(430px, 100%);
      max-height: 80vh;
      overflow: auto;
      border-radius: 26px;
      padding: 26px 20px 20px;
      background: white;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,.25);
      animation: pop .3s ease;
    }
    .trophy { font-size: 54px; }
    .modal-card h3 {
      margin: 7px 0 6px;
      font-size: 27px;
    }
    .modal-card > p {
      margin: 0 0 16px;
      color: var(--sub);
      font-size: 14px;
    }
    .pr-list {
      margin: 0 0 18px;
      padding: 0;
      list-style: none;
      text-align: left;
    }
    .pr-item {
      margin-bottom: 9px;
      padding: 12px 13px;
      border-radius: 14px;
      background: var(--gold-bg);
      color: #744210;
    }
    .pr-item strong {
      display: block;
      margin-bottom: 3px;
    }
    .pr-item span { font-size: 13px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      z-index: 120;
      transform: translate(-50%, 20px);
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.92);
      color: white;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 590px) {
      .part-grid { gap: 12px; }
      .part-btn {
        min-height: 130px;
        padding: 17px;
      }
      .part-btn .icon { margin-bottom: 18px; }

      .set-row {
        grid-template-columns: 46px 82px minmax(0, 1fr);
        gap: 8px;
        padding: 11px 11px;
      }
      .set-row.sided {
        grid-template-columns: 44px 66px 66px minmax(0, 1fr);
        gap: 6px;
      }
      .field input {
        padding-left: 5px;
        padding-right: 27px;
      }
      .unit {
        right: 6px;
        font-size: 10px;
      }
      .field textarea {
        padding-left: 9px;
        padding-right: 9px;
        font-size: 13px;
      }
    }

    @media (max-width: 390px) {
      .set-row.sided {
        grid-template-columns: 40px 61px 61px minmax(0, 1fr);
      }
      .set-label { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homePage" class="page active">
      <div class="header">
        <h1>我的训练</h1>
        <p>选择今天要训练的部位</p>
      </div>

      <div class="part-grid">
        <button class="part-btn disabled" type="button" aria-disabled="true">
          <span class="icon">🏋️</span>
          <span class="name">胸</span>
          <span class="state">待添加</span>
        </button>

        <button class="part-btn disabled" type="button" aria-disabled="true">
          <span class="icon">💪</span>
          <span class="name">肩</span>
          <span class="state">待添加</span>
        </button>

        <button id="openBack" class="part-btn available" type="button">
          <span class="icon">🔥</span>
          <span class="name">背</span>
          <span id="backState" class="state">进入训练</span>
        </button>

        <button class="part-btn disabled" type="button" aria-disabled="true">
          <span class="icon">⚡</span>
          <span class="name">腹</span>
          <span class="state">待添加</span>
        </button>
      </div>
    </section>

    <section id="backPage" class="page">
      <div class="topbar">
        <button id="goHome" class="icon-btn" type="button" aria-label="返回">←</button>
        <div class="title-wrap">
          <h2>背部训练</h2>
          <p id="sessionDate">本次记录会自动保存</p>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="current" type="button">本次训练</button>
        <button class="tab-btn" data-tab="history" type="button">历史记录</button>
      </div>

      <section id="currentPanel" class="tab-panel active">
        <div class="summary">
          <div class="summary-row">
            <strong id="progressText">已完成 0 / 12 组</strong>
            <span id="saveText">自动保存</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <div id="exerciseList"></div>

        <div id="finishCard" class="finish-card">
          <div class="check">✓</div>
          <h3>背部训练完成</h3>
          <p>本次训练已经自动加入历史记录。</p>
          <button id="newSessionBtn" class="primary-btn" type="button">开始下一次背部训练</button>
        </div>

        <div id="resetWrap" class="subtle-wrap">
          <button id="resetBtn" class="text-btn" type="button">清空本次尚未完成的记录</button>
        </div>
      </section>

      <section id="historyPanel" class="tab-panel">
        <div id="historyList"></div>
        <div id="clearHistoryWrap" class="subtle-wrap">
          <button id="clearHistoryBtn" class="text-btn danger" type="button">清空全部历史记录</button>
        </div>
      </section>
    </section>
  </main>

  <div id="prModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="prTitle">
    <div class="modal-card">
      <div class="trophy">🏆</div>
      <h3 id="prTitle">创造新高</h3>
      <p>本次总次数超过了之前的最高纪录</p>
      <ul id="prList" class="pr-list"></ul>
      <button id="closePrBtn" class="primary-btn" type="button">太好了</button>
    </div>
  </div>

  <div id="toast" class="toast">已自动保存</div>

  <script>
    const EXERCISES = [
      {
        id: "pullup",
        name: "引体向上",
        detail: "自重",
        mode: "normal"
      },
      {
        id: "latPulldown",
        name: "高位下拉",
        detail: "固定重量：70 kg",
        mode: "normal"
      },
      {
        id: "cableRow",
        name: "龙门架单边背拉",
        detail: "固定重量：27.5 kg｜左右手分别记录",
        mode: "sided"
      }
    ];

    const HISTORY_KEY = "backWorkoutHistoryV2";
    const DRAFT_KEY = "backWorkoutDraftV2";
    const LEGACY_KEY = "backWorkoutRecordV1";

    const homePage = document.getElementById("homePage");
    const backPage = document.getElementById("backPage");
    const exerciseList = document.getElementById("exerciseList");
    const historyList = document.getElementById("historyList");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const finishCard = document.getElementById("finishCard");
    const resetWrap = document.getElementById("resetWrap");
    const saveText = document.getElementById("saveText");
    const sessionDate = document.getElementById("sessionDate");
    const prModal = document.getElementById("prModal");
    const prList = document.getElementById("prList");
    const toast = document.getElementById("toast");
    const backState = document.getElementById("backState");

    let currentDraft = null;
    let saveTimer = null;
    let toastTimer = null;
    let finalizing = false;

    function nowIso() {
      return new Date().toISOString();
    }

    function formatDateTime(iso) {
      const date = new Date(iso);
      const dateText = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        weekday: "short"
      }).format(date);

      const timeText = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Tokyo",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);

      return { dateText, timeText };
    }

    function newSession() {
      const exercises = {};

      EXERCISES.forEach(exercise => {
        exercises[exercise.id] = Array.from({ length: 4 }, () => {
          if (exercise.mode === "sided") {
            return { left: "", right: "", comment: "" };
          }
          return { reps: "", comment: "" };
        });
      });

      return {
        id: "back-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        startedAt: nowIso(),
        completedAt: null,
        exercises,
        totals: {},
        prFlags: {}
      };
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function loadDraft() {
      try {
        const parsed = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null");
        return parsed && parsed.exercises ? parsed : null;
      } catch {
        return null;
      }
    }

    function saveDraft() {
      localStorage.setItem(DRAFT_KEY, JSON.stringify(currentDraft));
      saveText.textContent = currentDraft.completedAt ? "已存入历史" : "已自动保存";
      updateHomeState();
    }

    function migrateLegacyIfNeeded() {
      if (localStorage.getItem(DRAFT_KEY)) return;

      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || "null");
        if (!legacy) return;

        const migrated = newSession();

        ["pullup", "latPulldown", "cableRow"].forEach(id => {
          if (!Array.isArray(legacy[id])) return;

          legacy[id].forEach((set, index) => {
            if (!migrated.exercises[id][index]) return;

            if (id === "cableRow") {
              migrated.exercises[id][index].left = set.reps || "";
              migrated.exercises[id][index].right = set.reps || "";
              migrated.exercises[id][index].comment = set.comment || "";
            } else {
              migrated.exercises[id][index].reps = set.reps || "";
              migrated.exercises[id][index].comment = set.comment || "";
            }
          });
        });

        currentDraft = migrated;
        saveDraft();
      } catch {
        // 旧数据读取失败时直接忽略
      }
    }

    function createExerciseCards() {
      exerciseList.innerHTML = EXERCISES.map((exercise, exerciseIndex) => {
        const rows = Array.from({ length: 4 }, (_, setIndex) => {
          if (exercise.mode === "sided") {
            return `
              <div class="set-row sided">
                <div class="set-label">第${setIndex + 1}组</div>

                <div class="field">
                  <input
                    type="number"
                    min="0"
                    step="1"
                    inputmode="numeric"
                    placeholder=""
                    aria-label="${exercise.name}第${setIndex + 1}组左手次数"
                    data-exercise="${exercise.id}"
                    data-set="${setIndex}"
                    data-type="left"
                  />
                  <span class="unit">左</span>
                </div>

                <div class="field">
                  <input
                    type="number"
                    min="0"
                    step="1"
                    inputmode="numeric"
                    placeholder=""
                    aria-label="${exercise.name}第${setIndex + 1}组右手次数"
                    data-exercise="${exercise.id}"
                    data-set="${setIndex}"
                    data-type="right"
                  />
                  <span class="unit">右</span>
                </div>

                <div class="field">
                  <textarea
                    rows="1"
                    placeholder="本组评论"
                    aria-label="${exercise.name}第${setIndex + 1}组评论"
                    data-exercise="${exercise.id}"
                    data-set="${setIndex}"
                    data-type="comment"
                  ></textarea>
                </div>
              </div>
            `;
          }

          return `
            <div class="set-row">
              <div class="set-label">第${setIndex + 1}组</div>

              <div class="field">
                <input
                  type="number"
                  min="0"
                  step="1"
                  inputmode="numeric"
                  placeholder=""
                  aria-label="${exercise.name}第${setIndex + 1}组次数"
                  data-exercise="${exercise.id}"
                  data-set="${setIndex}"
                  data-type="reps"
                />
                <span class="unit">次</span>
              </div>

              <div class="field">
                <textarea
                  rows="1"
                  placeholder="本组评论"
                  aria-label="${exercise.name}第${setIndex + 1}组评论"
                  data-exercise="${exercise.id}"
                  data-set="${setIndex}"
                  data-type="comment"
                ></textarea>
              </div>
            </div>
          `;
        }).join("");

        return `
          <article class="exercise-card">
            <div class="exercise-head">
              <div>
                <h3>${exerciseIndex + 1}. ${exercise.name}</h3>
                <p>${exercise.detail}</p>
              </div>
              <span id="badge-${exercise.id}" class="badge">0 / 4</span>
            </div>
            <div>${rows}</div>
          </article>
        `;
      }).join("");
    }

    function applyDraftToForm() {
      document.querySelectorAll("[data-exercise]").forEach(field => {
        const exerciseId = field.dataset.exercise;
        const setIndex = Number(field.dataset.set);
        const type = field.dataset.type;
        field.value = currentDraft?.exercises?.[exerciseId]?.[setIndex]?.[type] ?? "";
        field.disabled = Boolean(currentDraft.completedAt);
      });

      const formatted = formatDateTime(currentDraft.startedAt);
      sessionDate.textContent = currentDraft.completedAt
        ? `${formatted.dateText}完成，已保存到历史`
        : `${formatted.dateText}开始，填写后自动保存`;
    }

    function collectFormIntoDraft() {
      document.querySelectorAll("[data-exercise]").forEach(field => {
        const exerciseId = field.dataset.exercise;
        const setIndex = Number(field.dataset.set);
        const type = field.dataset.type;
        currentDraft.exercises[exerciseId][setIndex][type] = field.value;
      });
    }

    function isFilled(value) {
      return String(value ?? "").trim() !== "";
    }

    function numeric(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function completedSetsFor(exercise) {
      const sets = currentDraft.exercises[exercise.id];

      return sets.filter(set => {
        if (exercise.mode === "sided") {
          return isFilled(set.left) && isFilled(set.right);
        }
        return isFilled(set.reps);
      }).length;
    }

    function getExerciseTotal(session, exercise) {
      const sets = session.exercises[exercise.id] || [];

      if (exercise.mode === "sided") {
        return sets.reduce((sum, set) => {
          return sum + numeric(set.left) + numeric(set.right);
        }, 0);
      }

      return sets.reduce((sum, set) => sum + numeric(set.reps), 0);
    }

    function getSideTotals(session, exercise) {
      if (exercise.mode !== "sided") return null;
      const sets = session.exercises[exercise.id] || [];

      return {
        left: sets.reduce((sum, set) => sum + numeric(set.left), 0),
        right: sets.reduce((sum, set) => sum + numeric(set.right), 0)
      };
    }

    function updateProgress() {
      let doneGroups = 0;

      EXERCISES.forEach(exercise => {
        const done = completedSetsFor(exercise);
        doneGroups += done;

        const badge = document.getElementById(`badge-${exercise.id}`);
        badge.textContent = done === 4 ? "已完成" : `${done} / 4`;
        badge.classList.toggle("done", done === 4);
      });

      progressText.textContent = `已完成 ${doneGroups} / 12 组`;
      progressBar.style.width = `${(doneGroups / 12) * 100}%`;

      const completed = Boolean(currentDraft.completedAt);
      finishCard.classList.toggle("show", completed);
      resetWrap.style.display = completed ? "none" : "block";

      if (doneGroups === 12 && !completed && !finalizing) {
        finalizeSession();
      }
    }

    function previousMaxFor(exerciseId, history) {
      const values = history.map(session => numeric(session.totals?.[exerciseId]));
      return values.length ? Math.max(...values) : null;
    }

    function finalizeSession() {
      finalizing = true;
      collectFormIntoDraft();

      const history = loadHistory();
      const prItems = [];

      currentDraft.completedAt = nowIso();
      currentDraft.totals = {};
      currentDraft.prFlags = {};

      EXERCISES.forEach(exercise => {
        const total = getExerciseTotal(currentDraft, exercise);
        const previousMax = previousMaxFor(exercise.id, history);
        const isPr = previousMax !== null && total > previousMax;

        currentDraft.totals[exercise.id] = total;
        currentDraft.prFlags[exercise.id] = isPr;

        if (isPr) {
          prItems.push({
            name: exercise.name,
            total,
            previousMax
          });
        }
      });

      history.push(JSON.parse(JSON.stringify(currentDraft)));
      saveHistory(history);
      saveDraft();
      applyDraftToForm();
      renderHistory();
      updateProgress();
      showToast("已完成并保存到历史");

      if (prItems.length) {
        showPrModal(prItems);
      }

      finalizing = false;
    }

    function showPrModal(items) {
      prList.innerHTML = items.map(item => `
        <li class="pr-item">
          <strong>${item.name}</strong>
          <span>本次 ${item.total} 次｜之前最高 ${item.previousMax} 次</span>
        </li>
      `).join("");

      prModal.classList.add("show");
    }

    function showToast(message) {
      toast.textContent = message;
      clearTimeout(toastTimer);
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1300);
    }

    function renderHistory() {
      const history = loadHistory().slice().reverse();
      document.getElementById("clearHistoryWrap").style.display =
        history.length ? "block" : "none";

      if (!history.length) {
        historyList.innerHTML = `
          <div class="history-empty">
            还没有完成过背部训练。<br />
            第一次完成后会自动出现在这里。
          </div>
        `;
        return;
      }

      historyList.innerHTML = history.map((session, index) => {
        const date = formatDateTime(session.completedAt || session.startedAt);

        const exerciseRows = EXERCISES.map(exercise => {
          const total = numeric(session.totals?.[exercise.id]) ||
                        getExerciseTotal(session, exercise);
          const isPr = Boolean(session.prFlags?.[exercise.id]);
          const sets = session.exercises?.[exercise.id] || [];

          let setsText = "";
          if (exercise.mode === "sided") {
            const sideTotals = getSideTotals(session, exercise);
            setsText = sets.map((set, i) =>
              `第${i + 1}组 左${set.left || 0} / 右${set.right || 0}`
            ).join("　");
            setsText += `<br>左手合计 ${sideTotals.left} 次｜右手合计 ${sideTotals.right} 次`;
          } else {
            setsText = sets.map((set, i) =>
              `第${i + 1}组 ${set.reps || 0}`
            ).join("　");
          }

          return `
            <div class="history-exercise">
              <div class="history-exercise-head">
                <strong>
                  ${exercise.name}
                  ${isPr ? '<span class="pr-pill">当时新高</span>' : ''}
                </strong>
                <span class="total">总计 ${total} 次</span>
              </div>
              <div class="sets-text">${setsText}</div>
            </div>
          `;
        }).join("");

        return `
          <article class="history-card">
            <div class="history-top">
              <div>
                <div class="history-date">${date.dateText}</div>
                <div class="history-time">${date.timeText} 完成</div>
              </div>
              <div class="history-number">第 ${history.length - index} 次</div>
            </div>
            ${exerciseRows}
          </article>
        `;
      }).join("");
    }

    function updateHomeState() {
      const historyCount = loadHistory().length;

      if (currentDraft?.completedAt) {
        backState.textContent = historyCount
          ? `已保存 ${historyCount} 次训练`
          : "进入训练";
        return;
      }

      const done = EXERCISES.reduce((sum, exercise) => {
        return sum + completedSetsFor(exercise);
      }, 0);

      backState.textContent = done > 0
        ? `本次已填 ${done} / 12 组`
        : historyCount > 0
          ? `已有 ${historyCount} 次记录`
          : "进入训练";
    }

    function startNewSession() {
      currentDraft = newSession();
      saveDraft();
      applyDraftToForm();
      updateProgress();
      switchTab("current");
      window.scrollTo({ top: 0, behavior: "smooth" });
      showToast("已开始新的背部训练");
    }

    function switchPage(target) {
      homePage.classList.toggle("active", target === "home");
      backPage.classList.toggle("active", target === "back");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === tabName);
      });

      document.getElementById("currentPanel").classList.toggle(
        "active",
        tabName === "current"
      );
      document.getElementById("historyPanel").classList.toggle(
        "active",
        tabName === "history"
      );

      if (tabName === "history") renderHistory();
    }

    document.getElementById("openBack").addEventListener("click", () => {
      switchPage("back");
    });

    document.getElementById("goHome").addEventListener("click", () => {
      switchPage("home");
    });

    document.querySelectorAll(".tab-btn").forEach(button => {
      button.addEventListener("click", () => switchTab(button.dataset.tab));
    });

    exerciseList.addEventListener("input", event => {
      if (!event.target.matches("[data-exercise]") || currentDraft.completedAt) return;

      collectFormIntoDraft();
      saveText.textContent = "保存中…";
      updateProgress();

      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveDraft();
      }, 220);
    });

    exerciseList.addEventListener("change", event => {
      if (!event.target.matches("[data-exercise]") || currentDraft.completedAt) return;
      collectFormIntoDraft();
      saveDraft();
      updateProgress();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (currentDraft.completedAt) return;

      const confirmed = confirm("确定清空本次尚未完成的训练记录吗？");
      if (!confirmed) return;

      currentDraft = newSession();
      saveDraft();
      applyDraftToForm();
      updateProgress();
      showToast("本次记录已清空");
    });

    document.getElementById("newSessionBtn").addEventListener("click", startNewSession);

    document.getElementById("clearHistoryBtn").addEventListener("click", () => {
      const confirmed = confirm("确定清空所有背部训练历史吗？此操作不能恢复。");
      if (!confirmed) return;

      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
      updateHomeState();
      showToast("历史记录已清空");
    });

    document.getElementById("closePrBtn").addEventListener("click", () => {
      prModal.classList.remove("show");
    });

    prModal.addEventListener("click", event => {
      if (event.target === prModal) prModal.classList.remove("show");
    });

    createExerciseCards();
    migrateLegacyIfNeeded();
    currentDraft = loadDraft() || newSession();
    saveDraft();
    applyDraftToForm();
    updateProgress();
    renderHistory();
    updateHomeState();
  </script>
</body>
</html>
